apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
      - name: simple-app
        image: YOUR_DOCKERHUB_USERNAME/simple-app:1  # Will be dynamically replaced by Jenkins
        ports:
        - containerPort: 8080
